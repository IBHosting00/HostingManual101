<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
:root{--bg:#0a0f1c;--panel:rgba(255,255,255,.06);--line:rgba(255,255,255,.12);--text:#eef3ff;--muted:#9fb0d1;}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at 20% 20%,#16213e,transparent 35%),radial-gradient(circle at 80% 30%,#113355,transparent 30%),linear-gradient(135deg,#060913,#0a0f1c 55%,#081120);color:var(--text);min-height:100vh;display:grid;place-items:center;overflow:hidden}
body:before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:32px 32px;mask-image:radial-gradient(circle at center,black,transparent 80%)}
.card{position:relative;width:min(92vw,380px);padding:28px;border:1px solid var(--line);border-radius:22px;background:var(--panel);backdrop-filter:blur(14px);box-shadow:0 20px 60px rgba(0,0,0,.45)}
.badge{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:#8fd3ff;margin-bottom:14px}
h1{margin:0 0 8px;font-size:30px;font-weight:700}p{margin:0 0 22px;color:var(--muted);font-size:14px}
.field{margin-bottom:14px}.field label{display:block;font-size:12px;color:#aebbe0;margin-bottom:7px}
.field input{width:100%;padding:14px 15px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);outline:none}
.field input:focus{border-color:#63b9ff;box-shadow:0 0 0 4px rgba(99,185,255,.12)}
button{width:100%;margin-top:8px;padding:14px;border:0;border-radius:14px;background:linear-gradient(90deg,#5ec8ff,#7a7dff);color:white;font-weight:700;letter-spacing:.04em;cursor:pointer;transition:.2s transform,.2s opacity}
button:hover{transform:translateY(-1px)}
.meta{display:flex;justify-content:space-between;margin-top:14px;font-size:12px;color:var(--muted)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#49ff95;box-shadow:0 0 10px #49ff95;margin-right:6px}

/* ── Loader overlay ── */
#loader{display:none;position:fixed;inset:0;z-index:99;flex-direction:column;justify-content:center;align-items:center;background:radial-gradient(circle at 20% 20%,#16213e,transparent 35%),radial-gradient(circle at 80% 30%,#113355,transparent 30%),linear-gradient(135deg,#060913,#0a0f1c 55%,#081120);gap:24px;}
#loader:before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:32px 32px;mask-image:radial-gradient(circle at center,black,transparent 80%)}
.ringWrap{width:110px;height:110px;display:grid;place-items:center;position:relative}
.ring{width:84px;height:84px;border-radius:50%;border:6px solid rgba(90,160,255,.12);border-top:6px solid #69b7ff;box-shadow:0 0 28px rgba(105,183,255,.35);animation:spin 1.1s linear infinite}
.ringWrap:before{content:'';position:absolute;inset:-14px;border-radius:50%;border:1px solid rgba(120,180,255,.06)}
@keyframes spin{to{transform:rotate(360deg)}}
.loadText{letter-spacing:.18em;font-size:13px;color:#8fa6cf;text-transform:uppercase;text-align:center}
.bar-wrap{width:220px;height:3px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden}
.bar{height:100%;width:0%;background:linear-gradient(90deg,#5ec8ff,#7a7dff);border-radius:99px;transition:width .05s linear}
.pct{font-size:13px;color:#8fa6cf;letter-spacing:.06em;min-width:36px;text-align:center}
.loader-footer{position:fixed;bottom:28px;left:0;right:0;display:flex;justify-content:space-between;padding:0 28px;font-size:13px;color:#8aa0c8}

/* done state */
#doneState{display:none;flex-direction:column;align-items:center;gap:12px}
.check{width:56px;height:56px;border-radius:50%;border:3px solid #49ff95;display:flex;align-items:center;justify-content:center;animation:pop .35s ease}
@keyframes pop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.check svg{width:24px;height:24px;stroke:#49ff95;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.doneText{font-size:12px;letter-spacing:.2em;color:#49ff95;text-transform:uppercase}
</style>
</head>
<body>

<div class="card">
  <div class="badge">Secure Access</div>
  <h1>Welcome Back</h1>
  <p>Authenticate to continue.</p>
  <div class="field"><label>Username</label><input type="text" placeholder="Enter username"></div>
  <div class="field"><label>Password</label><input type="password" placeholder="Enter password"></div>
  <button id="loginBtn" onclick="login()">Login</button>
  <div id="msg" style="margin-top:12px;font-size:13px;color:#ff9ea8;"></div>
  <div class="meta"><span><span class="dot"></span>System Online</span><span>v1.0</span></div>
</div>

<!-- Fullscreen loader -->
<div id="loader">
  <div id="spinState" style="display:flex;flex-direction:column;align-items:center;gap:24px">
    <div class="ringWrap"><div class="ring"></div></div>
    <div class="loadText" id="loadMsg">Initializing security protocols</div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="bar-wrap"><div class="bar" id="bar"></div></div>
      <div class="pct" id="pct">0%</div>
    </div>
  </div>
  <div id="doneState">
    <div class="check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
    <div class="doneText">Access Granted</div>
  </div>
  <div class="loader-footer">
    <span><span class="dot"></span>System Online</span>
    <span>v1.0</span>
  </div>
</div>
<script>
if (localStorage.getItem("loggedIn") === "true") {
    window.location.replace("/Landing.html");
}
</script>
<script>
const accounts = [
  { user: 'admin', pass: 'alpha123' },
  { user: 'juan', pass: '120398475829juan0123984940312' },
  { user: 'Sven',  pass: '1234354342Sven2324356342312' },
  { user: 'Gasver',  pass: '12354342Gasver23243542312' },
  { user: 'JohnCarnegie',  pass: '1234354342John2324354234212' },
  { user: 'N',  pass: '1234354342NNNNNN2324354234212' }, 
  { user: 'LuckyMango',  pass: '1234354342LuckyMango2324354234212' },
  { user: 'Crystallina',  pass: '1234354342Crystallina2324354234212' },
  { user: 'DM',  pass: '1234354342DMDMDMDM2324354234212' }
];

const msgs = [
  'Initializing security protocols',
  'Verifying credentials',
  'Loading your workspace',
  'Almost ready'
];

function login(){
  const inputs = document.querySelectorAll('input');
  const username = inputs[0].value.trim();
  const password = inputs[1].value;
  const msgEl = document.getElementById('msg');
  const valid = accounts.some(a => a.user === username && a.pass === password);

  if(valid){
    msgEl.textContent = '';
    document.getElementById('loginBtn').disabled = true;
    document.querySelector('.card').style.visibility = 'hidden';
    document.getElementById('loader').style.display = 'flex';
    startLoader();
  } else {
    msgEl.textContent = 'Invalid username or password';
  }
}

function startLoader(){
  let p = 0;
  const bar = document.getElementById('bar');
  const pct = document.getElementById('pct');
  const msg = document.getElementById('loadMsg');
  const iv = setInterval(() => {
    p++;
    bar.style.width = p + '%';
    pct.textContent = p + '%';
    msg.textContent = msgs[Math.min(Math.floor((p / 100) * msgs.length), msgs.length - 1)];
    if(p >= 100){
      clearInterval(iv);
      setTimeout(() => {
        document.getElementById('spinState').style.display = 'none';
        document.getElementById('doneState').style.display = 'flex';
        setTimeout(() => { window.location.href = '/Landing.html'; }, 900);
      }, 150);
    }
  }, 30);
}

document.addEventListener('keydown', e => { if(e.key === 'Enter') login(); });
</script>
</body>
</html>
